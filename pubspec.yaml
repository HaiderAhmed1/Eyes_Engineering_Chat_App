name: chat_app
description: "تطبيق عيون الهندسة للمحادثات" # تم تحديث الوصف ليكون احترافياً
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Firebase Core & Services ---
  firebase_core: ^3.4.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.2
  firebase_storage: ^12.3.1
  firebase_messaging: ^15.1.2
  firebase_database: ^11.1.3

  # --- Calls & Communication ---
  agora_rtc_engine: ^6.3.2

  # --- Files, Media & Audio ---
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  video_player: ^2.9.1
  chewie: ^1.8.5
  flutter_sound: ^9.2.13
  audio_session: ^0.1.21
  video_compress: ^3.1.2
  audioplayers: ^5.2.1

  # --- App Updates & Network (جديد) ---
  dio: ^5.4.3+1 # للتحميل الداخلي لملف التحديث
  open_filex: ^4.4.0 # لفتح ملف الـ APK وبدء التثبيت

  # --- Utilities & Helpers ---
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  http: ^1.2.1
  intl: ^0.20.2
  path: ^1.9.0

  # 💡 [إضافات جديدة احترافية للتطبيق] 💡
  cached_network_image: ^3.3.1 # لحفظ الصور في الذاكرة وتقليل استهلاك الإنترنت
  timeago: ^3.6.1 # لتحويل التواريخ إلى صيغة (منذ 5 دقائق، منذ ساعتين)
  uuid: ^4.4.0 # لتوليد معرفات (IDs) فريدة للرسائل والمكالمات

  # --- System Info & Notifications ---
  package_info_plus: ^8.0.0
  flutter_local_notifications: ^19.5.0

  # --- UI & Styling ---
  flutter_slidable: ^3.1.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# إعدادات أيقونة التطبيق
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  # 💡 تم تحديث المسارات لضمان وصول التطبيق لجميع الملفات
  assets:
    - assets/
    - assets/icons/
    - assets/placeholder.png # لضمان عمل الصورة الافتراضية للبروفايل
    - assets/sounds/ # تعريف مجلد الصوتيات لكي يتعرف التطبيق على نغمات الرنين