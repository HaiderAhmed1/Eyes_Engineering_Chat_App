name: chat_app
description: "تطبيق عيون الهندسة للمحادثات والمكالمات المرئية والصوتية"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Firebase Core & Services ---
  firebase_core: ^3.4.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.2
  firebase_storage: ^12.3.1
  firebase_messaging: ^15.1.2
  firebase_database: ^11.1.3

  # --- Calls & Communication (تم التحديث لدعم ميزات الاتصال) ---
  agora_rtc_engine: ^6.3.2
  wakelock_plus: ^1.2.8 # ضروري لـ video_call_screen لمنع قفل الشاشة تلقائياً أثناء المكالمة
  vibration: ^2.0.1 # يستخدم في incoming_call_screen لإضافة ميزة الاهتزاز عند الاتصال
  connectivity_plus: ^6.0.3 # مفيد لـ call_service لفحص حالة الشبكة قبل بدء المكالمة

  # --- Files, Media & Audio ---
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  video_player: ^2.9.1
  chewie: ^1.8.5
  flutter_sound: ^9.2.13
  audio_session: ^0.1.21
  video_compress: ^3.1.2
  audioplayers: ^5.2.1 # يستخدم لتشغيل نغمات الرنين في شاشة المكالمة الواردة

  # --- App Updates & Network ---
  dio: ^5.4.3+1
  open_filex: ^4.4.0

  # --- Utilities & Helpers ---
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1 # ضروري لطلب صلاحيات الكاميرا والميكروفون للمكالمات
  shared_preferences: ^2.3.2
  http: ^1.2.1
  intl: ^0.20.2
  path: ^1.9.0
  cached_network_image: ^3.3.1
  timeago: ^3.6.1
  uuid: ^4.4.0

  # --- System Info & Notifications ---
  package_info_plus: ^8.0.0
  flutter_local_notifications: ^19.5.0

  # --- UI & Styling ---
  flutter_slidable: ^3.1.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# إعدادات أيقونة التطبيق
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/placeholder.png
    - assets/sounds/ # تأكد من وجود ملفات الرنين (مثل ringtone.mp3) داخل هذا المجلد